# Corne nice!nano v2 Configuration with USB HID enabled
# Place this file in config/corne.conf

# Enable USB HID (CRITICAL for USB keyboard functionality)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_HID_KEYBOARD=y

# Uncomment to enable encoder support
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y

# Set deep sleep to 30 minutes (or comment out to disable)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Bluetooth settings
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Name your keyboard
CONFIG_ZMK_KEYBOARD_NAME="Corne"

# Uncomment the following lines to enable RGB underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y


# Corne nice!nano v2 Configuration with USB HID enabled

# Enable USB (this automatically enables HID keyboard functionality)
CONFIG_USB_DEVICE_STACK=y

# Bluetooth settings
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Name your keyboard
CONFIG_ZMK_KEYBOARD_NAME="Corne"

# Set deep sleep to 30 minutes
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
